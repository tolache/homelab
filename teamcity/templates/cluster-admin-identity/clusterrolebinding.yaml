---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: teamcity-cluster-admin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "teamcity.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: teamcity
    namespace: {{ .Release.Namespace }}
{{- range .Values.rbac.extraUsers }}
  - kind: User
    name: {{ . }}
    apiGroup: rbac.authorization.k8s.io
{{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
